<header class="site-header">
  <div class="container header-inner">
    <a class="brand" href="{{ .Site.Home.RelPermalink }}">{{ .Site.Title }}</a>
    <nav aria-label="Main navigation">
      <ul class="menu">
        {{ $current := . }}
        {{ range .Site.Menus.main }}
          <li>
            <a
              href="{{ .URL | relURL }}"
              {{ if or ($current.IsMenuCurrent "main" .) ($current.HasMenuCurrent "main" .) }}aria-current="page"{{ end }}
            >
              {{ .Name }}
            </a>
          </li>
        {{ end }}
        <li>
          <a href="https://github.com/vavr0/knapsack_cryptosystems" target="_blank" rel="noopener noreferrer">GitHub</a>
        </li>
      </ul>
    </nav>
  </div>
</header>
